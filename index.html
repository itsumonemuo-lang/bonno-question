<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>煩悩Maxカード</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 40px 16px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: url("background.jpg") no-repeat center center fixed;
  background-size: cover;
  text-align: center;
}

h1 {
  font-size: 1.1em;
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}

/* --- カード --- */
.card-container {
  perspective: 1000px;
  max-width: 360px;
  margin: 0 auto;
}

.card-inner {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 4;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(.4,.2,.2,1);
  cursor: pointer;
}

.card-inner.flipped {
  transform: rotateY(180deg);
}

.card-inner::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: radial-gradient(circle at top left,
    rgba(255,255,255,0.6),
    rgba(255,255,255,0) 60%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.card-inner.flipped::after {
  opacity: 1;
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  backface-visibility: hidden;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

.card-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 14px;
}

.tap-text {
  position: absolute;
  bottom: 14px;
  font-size: 0.85em;
  background: rgba(255,255,255,0.85);
  padding: 6px 14px;
  border-radius: 999px;
}

.card-back {
  transform: rotateY(180deg);
  background: url("washi.jpg") center/cover;
  font-size: clamp(0.95rem, 4vw, 1.15rem);
  line-height: 1.7;
  text-align: center;
}

#question {
  margin: 0;
  padding: 0 6px;
  word-break: break-word;
}

.share-btn {
  margin-top: 18px;
  display: inline-block;
  font-size: 0.85em;
  padding: 8px 16px;
  border-radius: 999px;
  background: #000;
  color: #fff;
  text-decoration: none;
}
</style>
</head>

<body>

<h1>煩悩Maxカード</h1>

<div class="card-container">
  <div class="card-inner" id="card" onclick="flipCard()">

    <!-- 表 -->
    <div class="card-face card-front">
      <img src="front.png" alt="煩悩カード 表">
      <div class="tap-text">タップしてひらく</div>
    </div>

    <!-- 裏 -->
    <div class="card-face card-back">
      <div>
        <p id="question">ここに質問が表示されます</p>
        <a id="shareX" class="share-btn" href="#" target="_blank">
          Xで共有する
        </a>
      </div>
    </div>

  </div>
</div>

<audio id="flipSound" src="flip.mp3" preload="auto"></audio>

<script>
const allQuestions = [
  "すごいなぁと思う人は誰ですか？",
  "好きな名言or座右の銘はある？",
  "おすすめのスマホアプリを教えてください",
  "生まれ変わるなら？鳥or魚",
  "より辛いのは？両想いだけど会えないor会えるけど片想い",
  "どっちの方がマシ？歯を磨けないor足を洗えない",
  "好きだったテレビ番組は？",
  "好きなにおいor香りは？",
  "一番好き、または得意だった科目は？",
  "半年以上続いている、もしくは続けたい習慣は？",
  "登場人物になれるなら、どの映画を体験したい？",
  "言われて嬉しいのは？センスいいねor面白いね",
  "褒めてあげたい、自分の過去の選択・行動は？",
  "あなた流の人生を楽しむコツは？",
  "今の社会で、最も問題だと感じていることは？",
  "総理大臣になったら、どんな政策をつくりたい？",
  "一番印象に残っている学校行事の思い出は？",
  "人生の中でかなり緊張したエピソードは？",
  "人生最後に聞きたい曲は？",
  "一番やりたくない家事は？",
  "昔の自分に一言だけ言えるなら？",
  "無意識に距離を取りたくなる人の特徴は？",
  "雪山遭難3日目嬉しいのは？誰かの声が聞こえる orあたたかいスープを見つける",
  "「理解したいけど、一生理解できないかも」と思うジャンルは？"
  "スマホの充電、何％で焦る？"
  "どんな人を好きになりやすい？"
  "スマホの待ち受け何にしてる？"
  "今食べるなら？　うどんorそば"
  "あなたが世界一可愛いと思う生き物は？"
  "苦手な人の特徴を教えて"
  "あなたの宗教を作るなら、どんな教えを広めたい？"
  "夫婦円満の秘訣はある？なんだと思う？"
  "みんなに知られていない秘密を１つ明かそう"
  "走るなら朝派？夜派？"
  "自分の住んでいる地域を自慢してみよう！"
  "MBTIは何ですか？性格診断は興味ある？"
  "あなたという物語、今は第何章？"
  "透明になれる能力と、空を飛べる能力、どちらを選ぶ？"
  "住むなら？オバケの出ない事故物件orオバケの出る普通の物件"
  "選ぶなら？給料がサイコロで決まるor勤務地がダーツで決まる"
  "お風呂に入らなくても耐えられるのは何日まで？"
  "無人島で一人、何日いけると思う？"
  "本音を言って嫌われる？黙って好かれる？"
  "プレゼントはサプライズ派？事前に聞いてほしい派？"
  "一人焼肉いける？無理？"
  "ピンポンダッシュしたことある？ない？"
  "ドッキリを仕掛けたことはある？ない？"
  "友達と同じ人を好きになった。どうする？"
  "自分だけ誘われていないことに気づいた。どうする？"
];

let remainingQuestions = [...allQuestions];

function getSecureRandomInt(max) {
  const array = new Uint32Array(1);
  window.crypto.getRandomValues(array);
  return array[0] % max;
}

function flipCard() {
  const card = document.getElementById("card");
  const sound = document.getElementById("flipSound");

  if (!card.classList.contains("flipped")) {

    if (remainingQuestions.length === 0) {
      document.getElementById("question").textContent =
        "すべての質問を引ききりました。";
      document.getElementById("shareX").style.display = "none";
      return;
    }

    const index = getSecureRandomInt(remainingQuestions.length);
    const q = remainingQuestions.splice(index, 1)[0];

    document.getElementById("question").textContent = "Q." + q;

    const pageUrl = location.href;
    const crowdFundingUrl = "https://camp-fire.jp/projects/912318/preview?token=fwdpfbue&utm_campaign=cp_po_share_c_msg_projects_show";
    const hashtags = "#煩悩カードゲーム #にゃむ阿弥陀仏VS悟リーチ";

    const shareText =
`煩悩Maxカードで出た質問👇
Q.${q}

▼煩悩Maxカード108個の質問サイト
${pageUrl}

▼クラウドファンディングはこちら
${crowdFundingUrl}

${hashtags}`;

    document.getElementById("shareX").href =
      "https://x.com/intent/tweet?text=" +
      encodeURIComponent(shareText);

    sound.currentTime = 0;
    sound.play();
  }

  card.classList.toggle("flipped");
}
</script>

</body>
</html>
